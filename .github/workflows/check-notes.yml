name: Check Community Notes

on:
  pull_request:
  push:
    branches: [main]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/checkout@v4
        with:
          repository: sarveshsea/memi
          path: ark
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: ark/package-lock.json
      - run: npm ci
        working-directory: ark
      - run: MEMOIRE_COMMUNITY_NOTES_ROOT="$GITHUB_WORKSPACE" npm run check:community-notes
        working-directory: ark
